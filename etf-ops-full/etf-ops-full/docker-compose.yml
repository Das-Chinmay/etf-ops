version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: etfops
      POSTGRES_PASSWORD: etfops123
      POSTGRES_DB: etfops
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etfops"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://etfops:etfops123@db:5432/etfops
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_API_KEY: ${LLM_API_KEY:-your_key_here}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - sftp_files:/app/sftp_inbox

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  pgdata:
  sftp_files:
